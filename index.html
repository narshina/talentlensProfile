<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="profilePage">
        <div class="borderSection"></div>
        <div class="mainContent">
            <div class="sideBar">

                <div class="leftBox">
                    <div class="logo">
                        <img src="./images/TalentLogo.png" alt="logo">
                    </div>

                    <p>My Account</p>


                    <ul>
                        <li class="active">
                            <img src="./images/Icons (3).png" alt=""> Account Settings
                        </li>
                        <li>
                            <img src="./images/Icons (1).png" alt=""> Subscription
                        </li>
                        <li>
                            <img src="./images/Icons (2).png" alt=""> Billing & Invoices
                        </li>
                        <li>
                            <img src="./images/Icons (3).png" alt=""> Support & Help
                        </li>
                        <li>
                            <img src="./images/Icons (4).png" alt=""> Logout
                        </li>
                    </ul>
                </div>
            </div>
            <div class="profileContent">
                <div class="rightBox">
                    <div class="profileHeader">
                        <img src="./images/Ellipse 9.png" alt="Fatima Kumar">
                        <div class="profile-info">
                            <h2>Fatima Kumar</h2>
                            <p>fatima.kumar@gmail.com</p>
                        </div>
                    </div>

                    <div class="pro">
                        <button>PRO</button>
                        <p>You’re on the Pro plan. Renewing on September 30, 2026.</p>
                    </div>

                    <div class="userDetails"></div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
